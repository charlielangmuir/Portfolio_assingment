<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Charlie Langmuir — Portfolio</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #141414;
      --surface2: #1c1c1c;
      --border: #2a2a2a;
      --accent: #c8f06e;
      --accent2: #6efacd;
      --text: #e8e8e2;
      --muted: #888880;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: sans-serif;
      line-height: 1.7;
      overflow-x: hidden;
    }

    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      background: rgba(13,13,13,0.88);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 2.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
    }

    .nav-logo {
      font-family: monospace;
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      color: var(--accent);
      text-transform: uppercase;
    }

    .nav-links {
      display: flex;
      gap: 2rem;
      list-style: none;
    }

    .nav-links a {
      font-family: monospace;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    .nav-links a:hover { color: var(--accent); }

    #hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 80px 2.5rem 80px;
      max-width: 1100px;
      margin: 0 auto;
    }

    .hero-kicker {
      font-family: monospace;
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.4rem;
    }

    .hero-name {
      font-size: clamp(3.8rem, 7vw, 6.5rem);
      font-weight: 400;
      line-height: 1.0;
      color: var(--text);
    }

    .hero-role {
      margin-top: 1.5rem;
      font-size: 1.1rem;
      color: var(--muted);
      font-weight: 300;
    }

    .hero-links {
      margin-top: 3rem;
      display: flex;
      gap: 1.2rem;
    }

    .btn {
      font-family: monospace;
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.7rem 1.6rem;
      border-radius: 3px;
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }

    .btn-primary {
      background: var(--accent);
      color: #0d0d0d;
    }

    .btn-primary:hover { background: #d8ff7a; }

    .btn-outline {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-outline:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">

function Nav() {
  const links = ["About", "Resume", "Cover Letter", "Credentials", "Work Samples", "Capstone"];
  const ids   = ["about", "resume", "cover-letter", "credentials", "work-samples", "capstone"];
  return (
    <nav>
      <span className="nav-logo">CL</span>
      <ul className="nav-links">
        {links.map((l, i) => (
          <li key={l}><a href={`#${ids[i]}`}>{l}</a></li>
        ))}
      </ul>
    </nav>
  );
}

function Hero() {
  return (
    <section id="hero">
      <p className="hero-kicker">Portfolio — Spring 2026</p>
      <h1 className="hero-name">Charlie<br />Langmuir</h1>
      <p className="hero-role">Computer Programmer &amp; Analyst &nbsp;·&nbsp; George Brown College &nbsp;·&nbsp; Toronto, ON</p>
      <div className="hero-links">
        <a href="#about" className="btn btn-primary">View Portfolio</a>
        <a href="https://github.com/charlielangmuir" target="_blank" rel="noreferrer" className="btn btn-outline">GitHub</a>
        <a href="mailto:charlie.langmuir@gmail.com" className="btn btn-outline">Contact Me</a>
      </div>
    </section>
  );
}

function App() {
  return (
    <>
      <Nav />
      <Hero />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>

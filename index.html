<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Charlie Langmuir — Portfolio</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #141414;
      --surface2: #1c1c1c;
      --border: #2a2a2a;
      --accent: #c8f06e;
      --accent2: #6efacd;
      --text: #e8e8e2;
      --muted: #888880;
      --font-serif: 'DM Serif Display', Georgia, serif;
      --font-sans: 'DM Sans', sans-serif;
      --font-mono: 'DM Mono', monospace;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      font-weight: 300;
      line-height: 1.7;
      overflow-x: hidden;
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      background: rgba(13,13,13,0.88);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 2.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
    }

    .nav-logo {
      font-family: var(--font-mono);
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      color: var(--accent);
      text-transform: uppercase;
    }

    .nav-links {
      display: flex;
      gap: 2rem;
      list-style: none;
    }

    .nav-links a {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    .nav-links a:hover { color: var(--accent); }

    section {
      min-height: 100vh;
      padding: 120px 2.5rem 80px;
      max-width: 1100px;
      margin: 0 auto;
    }

    section.full { max-width: 100%; padding-left: 0; padding-right: 0; }

    .section-label {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.2rem;
    }

    h2.section-title {
      font-family: var(--font-serif);
      font-size: clamp(2.4rem, 4vw, 3.4rem);
      font-weight: 400;
      line-height: 1.15;
      color: var(--text);
      margin-bottom: 3rem;
    }

    #hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding-top: 80px;
      position: relative;
      overflow: hidden;
    }

    .hero-noise {
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E");
      pointer-events: none;
    }

    .hero-kicker {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.4rem;
      animation: fadeUp 0.6s ease both;
    }

    .hero-name {
      font-family: var(--font-serif);
      font-size: clamp(3.8rem, 7vw, 6.5rem);
      font-weight: 400;
      line-height: 1.0;
      letter-spacing: -0.01em;
      color: var(--text);
      animation: fadeUp 0.6s 0.1s ease both;
    }

    .hero-name em {
      font-style: italic;
      color: var(--accent);
    }

    .hero-role {
      margin-top: 1.5rem;
      font-size: 1.1rem;
      color: var(--muted);
      font-weight: 300;
      animation: fadeUp 0.6s 0.2s ease both;
    }

    .hero-links {
      margin-top: 3rem;
      display: flex;
      gap: 1.2rem;
      flex-wrap: wrap;
      animation: fadeUp 0.6s 0.3s ease both;
    }

    .btn {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.7rem 1.6rem;
      border-radius: 3px;
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }

    .btn-primary {
      background: var(--accent);
      color: #0d0d0d;
    }

    .btn-primary:hover {
      background: #d8ff7a;
      transform: translateY(-1px);
    }

    .btn-outline {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-outline:hover {
      border-color: var(--accent);
      color: var(--accent);
      transform: translateY(-1px);
    }

    .hero-scroll {
      position: absolute;
      bottom: 2.5rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      animation: fadeUp 0.6s 0.5s ease both;
    }

    .scroll-line {
      width: 1px;
      height: 40px;
      background: linear-gradient(to bottom, var(--accent), transparent);
      animation: scrollPulse 2s ease infinite;
    }

    .about-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 5rem;
      align-items: start;
    }

    .about-bio p {
      color: var(--muted);
      margin-bottom: 1.2rem;
      font-size: 1.0rem;
    }

    .about-bio p strong {
      color: var(--text);
      font-weight: 500;
    }

    .contact-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }

    .contact-list li {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      font-family: var(--font-mono);
      font-size: 0.8rem;
      color: var(--muted);
    }

    .contact-list a {
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    .contact-list a:hover { color: var(--accent); }

    .contact-icon {
      width: 18px;
      height: 18px;
      color: var(--accent);
      flex-shrink: 0;
    }

    .philosophy-box {
      margin-top: 3rem;
      padding: 2rem;
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      background: var(--surface);
      border-radius: 0 4px 4px 0;
    }

    .philosophy-box .quote-label {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 1rem;
    }

    .philosophy-box p {
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.8;
    }

    .resume-cols {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3rem;
    }

    .resume-group {
      margin-bottom: 2.5rem;
    }

    .resume-group-title {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.5rem;
      margin-bottom: 1.4rem;
    }

    .resume-entry {
      margin-bottom: 1.5rem;
    }

    .resume-entry-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 0.3rem;
    }

    .resume-entry-title {
      font-weight: 500;
      font-size: 0.95rem;
      color: var(--text);
    }

    .resume-entry-date {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      color: var(--muted);
      white-space: nowrap;
      margin-left: 1rem;
    }

    .resume-entry-sub {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 0.3rem;
    }

    .resume-entry-desc {
      font-size: 0.85rem;
      color: var(--muted);
      line-height: 1.6;
    }

    .skills-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .skill-tag {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      padding: 0.3rem 0.8rem;
      border: 1px solid var(--border);
      border-radius: 2px;
      color: var(--muted);
      background: var(--surface);
      transition: all 0.2s;
    }
    .skill-tag:hover { border-color: var(--accent); color: var(--accent); }

    .cover-letter-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 3rem;
      max-width: 720px;
    }

    .cover-letter-box .cl-header {
      margin-bottom: 2rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    .cover-letter-box .cl-name {
      font-family: var(--font-serif);
      font-size: 1.8rem;
      font-weight: 400;
      color: var(--text);
      margin-bottom: 0.4rem;
    }

    .cover-letter-box .cl-contact {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--muted);
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
    }

    .cover-letter-box .cl-body {
      font-size: 0.9rem;
      color: var(--muted);
      line-height: 1.85;
    }

    .cover-letter-box .cl-body p {
      margin-bottom: 1.2rem;
    }

    .cover-letter-box .cl-body strong {
      color: var(--text);
      font-weight: 500;
    }

    .credentials-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
    }

    .credential-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1.8rem;
      transition: border-color 0.2s;
    }
    .credential-card:hover { border-color: var(--accent); }

    .credential-card .cred-type {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.6rem;
    }

    .credential-card .cred-title {
      font-family: var(--font-serif);
      font-size: 1.15rem;
      font-weight: 400;
      color: var(--text);
      margin-bottom: 0.3rem;
    }

    .credential-card .cred-sub {
      font-size: 0.82rem;
      color: var(--muted);
    }

    .samples-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.5rem;
    }

    .sample-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1.8rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      transition: border-color 0.2s, transform 0.2s;
    }

    .sample-card:hover {
      border-color: var(--accent2);
      transform: translateY(-2px);
    }

    .sample-card .sample-number {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.1em;
    }

    .sample-card .sample-title {
      font-family: var(--font-serif);
      font-size: 1.2rem;
      font-weight: 400;
      color: var(--text);
    }

    .sample-card .sample-tech {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
    }

    .sample-card .sample-desc {
      font-size: 0.85rem;
      color: var(--muted);
      line-height: 1.65;
      flex: 1;
    }

    .tech-chip {
      font-family: var(--font-mono);
      font-size: 0.62rem;
      padding: 0.2rem 0.6rem;
      border-radius: 2px;
      background: var(--surface2);
      color: var(--accent2);
      border: 1px solid rgba(110,250,205,0.2);
    }

    .sample-actions {
      display: flex;
      gap: 0.7rem;
      margin-top: auto;
    }

    .sample-btn {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.5rem 1rem;
      border-radius: 3px;
      text-decoration: none;
      cursor: pointer;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
    }

    .sample-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .sample-btn.live:hover {
      border-color: var(--accent2);
      color: var(--accent2);
    }

    .capstone-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3rem;
      align-items: start;
    }

    .capstone-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 2rem;
      margin-bottom: 1.5rem;
    }

    .capstone-card-title {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1rem;
    }

    .capstone-card p, .capstone-card li {
      font-size: 0.88rem;
      color: var(--muted);
      line-height: 1.7;
    }

    .capstone-card ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .capstone-card ul li::before {
      content: '→';
      color: var(--accent);
      margin-right: 0.5rem;
      font-family: var(--font-mono);
    }

    .milestone-list {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .milestone-item {
      display: grid;
      grid-template-columns: 120px 1fr;
      gap: 1rem;
      padding: 0.9rem 0;
      border-bottom: 1px solid var(--border);
      align-items: start;
    }

    .milestone-item:last-child { border-bottom: none; }

    .milestone-date {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      color: var(--accent);
      padding-top: 0.1rem;
    }

    .milestone-name {
      font-size: 0.85rem;
      color: var(--muted);
    }

    .team-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
      margin-top: 1.5rem;
    }

    .team-member {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1.2rem;
      text-align: center;
    }

    .team-member .tm-name {
      font-size: 0.85rem;
      color: var(--text);
      font-weight: 500;
      margin-bottom: 0.2rem;
    }

    .team-member .tm-role {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: var(--muted);
    }

    .section-divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--border), transparent);
      margin: 0;
    }

    footer {
      text-align: center;
      padding: 3rem 2.5rem;
      border-top: 1px solid var(--border);
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    footer a { color: var(--accent); text-decoration: none; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes scrollPulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }

    @media (max-width: 768px) {
      .nav-links { display: none; }
      .about-grid, .resume-cols, .credentials-grid, .capstone-layout { grid-template-columns: 1fr; gap: 2rem; }
      .team-grid { grid-template-columns: 1fr 1fr; }
      .samples-grid { grid-template-columns: 1fr; }
      section { padding: 100px 1.2rem 60px; }
    }
  </style>
</head>
<body>
<div id="root"></div>

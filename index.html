<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Charlie Langmuir — Portfolio</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #141414;
      --surface2: #1c1c1c;
      --border: #2a2a2a;
      --accent: #c8f06e;
      --accent2: #6efacd;
      --text: #e8e8e2;
      --muted: #888880;
      --font-serif: 'DM Serif Display', Georgia, serif;
      --font-sans: 'DM Sans', sans-serif;
      --font-mono: 'DM Mono', monospace;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      font-weight: 300;
      line-height: 1.7;
      overflow-x: hidden;
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      background: rgba(13,13,13,0.88);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 2.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
    }

    .nav-logo {
      font-family: var(--font-mono);
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      color: var(--accent);
      text-transform: uppercase;
    }

    .nav-links {
      display: flex;
      gap: 2rem;
      list-style: none;
    }

    .nav-links a {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    .nav-links a:hover { color: var(--accent); }

    section {
      min-height: 100vh;
      padding: 120px 2.5rem 80px;
      max-width: 1100px;
      margin: 0 auto;
    }

    .section-label {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.2rem;
    }

    h2.section-title {
      font-family: var(--font-serif);
      font-size: clamp(2.4rem, 4vw, 3.4rem);
      font-weight: 400;
      line-height: 1.15;
      color: var(--text);
      margin-bottom: 3rem;
    }

    #hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding-top: 80px;
      position: relative;
      overflow: hidden;
    }

    .hero-noise {
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E");
      pointer-events: none;
    }

    .hero-kicker {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.4rem;
      animation: fadeUp 0.6s ease both;
    }

    .hero-name {
      font-family: var(--font-serif);
      font-size: clamp(3.8rem, 7vw, 6.5rem);
      font-weight: 400;
      line-height: 1.0;
      color: var(--text);
      animation: fadeUp 0.6s 0.1s ease both;
    }

    .hero-name em {
      font-style: italic;
      color: var(--accent);
    }

    .hero-role {
      margin-top: 1.5rem;
      font-size: 1.1rem;
      color: var(--muted);
      font-weight: 300;
      animation: fadeUp 0.6s 0.2s ease both;
    }

    .hero-links {
      margin-top: 3rem;
      display: flex;
      gap: 1.2rem;
      flex-wrap: wrap;
      animation: fadeUp 0.6s 0.3s ease both;
    }

    .hero-scroll {
      position: absolute;
      bottom: 2.5rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      animation: fadeUp 0.6s 0.5s ease both;
    }

    .scroll-line {
      width: 1px;
      height: 40px;
      background: linear-gradient(to bottom, var(--accent), transparent);
      animation: scrollPulse 2s ease infinite;
    }

    .btn {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.7rem 1.6rem;
      border-radius: 3px;
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }

    .btn-primary { background: var(--accent); color: #0d0d0d; }
    .btn-primary:hover { background: #d8ff7a; transform: translateY(-1px); }

    .btn-outline { background: transparent; color: var(--text); border: 1px solid var(--border); }
    .btn-outline:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-1px); }

    .section-divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--border), transparent);
    }

    footer {
      text-align: center;
      padding: 3rem 2.5rem;
      border-top: 1px solid var(--border);
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--muted);
    }

    footer a { color: var(--accent); text-decoration: none; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes scrollPulse {
      0%, 100% { opacity: 0.4; }
      50%       { opacity: 1; }
    }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">

const GithubIcon = () => (
  <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
    <path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.44 9.8 8.2 11.4.6.1.82-.26.82-.57v-2c-3.34.72-4.04-1.61-4.04-1.61-.54-1.38-1.33-1.75-1.33-1.75-1.08-.74.08-.73.08-.73 1.2.09 1.83 1.23 1.83 1.23 1.07 1.83 2.8 1.3 3.48.99.1-.78.42-1.3.76-1.6-2.67-.3-5.47-1.33-5.47-5.93 0-1.31.47-2.38 1.24-3.22-.13-.3-.54-1.52.12-3.18 0 0 1.01-.32 3.3 1.23a11.5 11.5 0 0 1 3-.4c1.02 0 2.04.13 3 .4 2.28-1.55 3.29-1.23 3.29-1.23.66 1.66.25 2.88.12 3.18.77.84 1.23 1.91 1.23 3.22 0 4.61-2.8 5.63-5.48 5.92.43.37.82 1.1.82 2.22v3.29c0 .32.21.69.83.57C20.57 21.8 24 17.3 24 12c0-6.63-5.37-12-12-12z"/>
  </svg>
);

function Nav() {
  const links = ["About","Resume","Cover Letter","Credentials","Work Samples","Capstone"];
  const ids   = ["about","resume","cover-letter","credentials","work-samples","capstone"];
  return (
    <nav>
      <span className="nav-logo">CL</span>
      <ul className="nav-links">
        {links.map((l,i) => <li key={l}><a href={`#${ids[i]}`}>{l}</a></li>)}
      </ul>
    </nav>
  );
}

function Hero() {
  return (
    <section id="hero">
      <div className="hero-noise" />
      <p className="hero-kicker">Portfolio — Spring 2026</p>
      <h1 className="hero-name">Charlie<br /><em>Langmuir</em></h1>
      <p className="hero-role">Computer Programmer &amp; Analyst &nbsp;·&nbsp; George Brown College &nbsp;·&nbsp; Toronto, ON</p>
      <div className="hero-links">
        <a href="#about" className="btn btn-primary">View Portfolio</a>
        <a href="https://github.com/charlielangmuir" target="_blank" rel="noreferrer" className="btn btn-outline"><GithubIcon /> GitHub</a>
        <a href="mailto:charlie.langmuir@gmail.com" className="btn btn-outline">Contact Me</a>
      </div>
      <div className="hero-scroll">
        <div className="scroll-line" />
        scroll
      </div>
    </section>
  );
}

function App() {
  return (
    <>
      <Nav />
      <Hero />
      <footer>
        <p>© 2026 Charlie Langmuir &nbsp;·&nbsp; <a href="https://github.com/charlielangmuir" target="_blank" rel="noreferrer">github.com/charlielangmuir</a></p>
      </footer>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
